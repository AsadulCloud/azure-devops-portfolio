---
# tasks file for roles/nginx
- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Start and enable nginx service
  service: 
    name: nginx
    state: started
    enabled: yes


- name: Deploy custom index page for {{ app_name }}
  copy:
    src: index.html
    dest: /var/www/html/index.html
  notify: restart nginx
    