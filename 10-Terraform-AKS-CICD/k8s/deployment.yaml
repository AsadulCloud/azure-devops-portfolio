apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-cicd-app
  labels:
    app: aks-cicd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aks-cicd-app
  template:
    metadata:
      labels:
        app: aks-cicd-app
    spec:
      containers:
        - name: aks-cicd-app
          # This image tag gets replaced automatically by the pipeline
          # with the ACR login server + build ID - see azure-pipelines.yml
          image: ACR_LOGIN_SERVER/aks-cicd-app:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
