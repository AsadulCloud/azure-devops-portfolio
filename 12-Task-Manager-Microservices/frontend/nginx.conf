server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Reverse proxy to the api-service, using Kubernetes' internal DNS name.
    # This means the browser only ever talks to the frontend's own origin -
    # it never needs to know the internal service names or ports directly.
    location /api-service/ {
        proxy_pass http://api-service:4000/;
    }

    location /notification-service/ {
        proxy_pass http://notification-service:5000/;
    }
}
