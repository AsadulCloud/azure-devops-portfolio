apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: asadulcicdacr.azurecr.io/task-manager-api:latest
          ports:
            - containerPort: 4000
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  # ClusterIP (internal only) - the frontend's nginx proxies to this,
  # so it never needs its own public IP. Only the frontend gets one.
  type: ClusterIP
  selector:
    app: api-service
  ports:
    - port: 4000
      targetPort: 4000
