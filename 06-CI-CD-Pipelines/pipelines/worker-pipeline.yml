# worker-pipeline.yml
# Full CI/CD Pipeline for the Worker service (.NET / C#)
#
# CI:  Build Docker image → Push to ACR
# CD:  Update image tag in k8s manifest → ArgoCD auto-syncs → Deploys to AKS

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - worker/**

pool:
  name: self-hosted   # Self-hosted agent running on Ubuntu 24.04 Azure VM

variables:
  acrName: '<your-acr-name>'
  acrLoginServer: '<your-acr-name>.azurecr.io'
  imageRepository: 'worker'
  dockerfilePath: 'worker/Dockerfile'
  tag: '$(Build.BuildId)'
  manifestRepo: '<your-manifests-repo-name>'
  manifestFile: 'k8s/worker-deployment.yaml'

stages:

# ─────────────────────────────────────────────
# STAGE 1: Build
# ─────────────────────────────────────────────
- stage: Build
  displayName: 'Build Docker Image – Worker (.NET)'
  jobs:
  - job: BuildImage
    displayName: 'Build worker image'
    steps:

    - task: Bash@3
      displayName: 'Set up Docker buildx'
      inputs:
        targetType: inline
        script: |
          docker buildx create --use --name mybuilder || true
          docker buildx inspect --bootstrap

    - task: Bash@3
      displayName: 'Build Docker image with buildx'
      inputs:
        targetType: inline
        script: |
          export DOCKER_BUILDKIT=1
          docker buildx build \
            --platform linux/amd64 \
            -f $(dockerfilePath) \
            -t $(imageRepository):$(tag) \
            -t $(imageRepository):latest \
            --load \
            ./worker
      env:
        DOCKER_BUILDKIT: '1'
      # Fix applied: removed -a $TARGETARCH from dotnet restore in Dockerfile
      # Fix applied: using buildx with --load so image is available locally for push

# ─────────────────────────────────────────────
# STAGE 2: Push
# ─────────────────────────────────────────────
- stage: Push
  displayName: 'Push Docker Image to ACR'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: PushImage
    displayName: 'Push worker image to ACR'
    steps:

    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: login
        containerRegistry: '<your-acr-service-connection>'

    - task: Bash@3
      displayName: 'Tag and push image to ACR'
      inputs:
        targetType: inline
        script: |
          docker tag $(imageRepository):$(tag) $(acrLoginServer)/$(imageRepository):$(tag)
          docker tag $(imageRepository):latest $(acrLoginServer)/$(imageRepository):latest
          docker push $(acrLoginServer)/$(imageRepository):$(tag)
          docker push $(acrLoginServer)/$(imageRepository):latest

# ─────────────────────────────────────────────
# STAGE 3: Update Manifest (CD - GitOps)
# ─────────────────────────────────────────────
- stage: UpdateManifest
  displayName: 'Update k8s Manifest – Trigger ArgoCD'
  dependsOn: Push
  condition: succeeded()
  jobs:
  - job: UpdateTag
    displayName: 'Update image tag in k8s manifest'
    steps:

    - task: Bash@3
      displayName: 'Configure git'
      inputs:
        targetType: inline
        script: |
          git config --global user.email "pipeline@azuredevops.com"
          git config --global user.name "Azure Pipeline"

    - task: Bash@3
      displayName: 'Clone manifests repo'
      inputs:
        targetType: inline
        script: |
          git clone https://$(System.AccessToken)@dev.azure.com/<your-org>/<your-project>/_git/$(manifestRepo) manifests
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    - task: Bash@3
      displayName: 'Update image tag in deployment manifest'
      inputs:
        targetType: inline
        script: |
          cd manifests
          sed -i "s|$(acrLoginServer)/$(imageRepository):.*|$(acrLoginServer)/$(imageRepository):$(tag)|g" $(manifestFile)
          echo "Updated manifest:"
          cat $(manifestFile)

    - task: Bash@3
      displayName: 'Commit and push updated manifest'
      inputs:
        targetType: inline
        script: |
          cd manifests
          git add $(manifestFile)
          git commit -m "Update worker image tag to $(tag) [skip ci]"
          git push
