# vote-pipeline.yml
# Full CI/CD Pipeline for the Vote service (Python / Flask)
#
# CI:  Build Docker image → Push to ACR
# CD:  Update image tag in k8s manifest → ArgoCD auto-syncs → Deploys to AKS

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - vote/**

pool:
  name: self-hosted   # Self-hosted agent running on Ubuntu 24.04 Azure VM

variables:
  acrName: '<your-acr-name>'
  acrLoginServer: '<your-acr-name>.azurecr.io'
  imageRepository: 'vote'
  dockerfilePath: 'vote/Dockerfile'
  tag: '$(Build.BuildId)'
  manifestRepo: '<your-manifests-repo-name>'       # Azure Repos repo that holds k8s manifests
  manifestFile: 'k8s/vote-deployment.yaml'         # Path to the vote deployment manifest

stages:

# ─────────────────────────────────────────────
# STAGE 1: Build
# ─────────────────────────────────────────────
- stage: Build
  displayName: 'Build Docker Image – Vote (Python)'
  jobs:
  - job: BuildImage
    displayName: 'Build vote image'
    steps:

    - task: Bash@3
      displayName: 'Build Docker image'
      inputs:
        targetType: inline
        script: |
          export DOCKER_BUILDKIT=1
          docker build \
            -f $(dockerfilePath) \
            -t $(imageRepository):$(tag) \
            -t $(imageRepository):latest \
            ./vote
      env:
        DOCKER_BUILDKIT: '1'

# ─────────────────────────────────────────────
# STAGE 2: Push
# ─────────────────────────────────────────────
- stage: Push
  displayName: 'Push Docker Image to ACR'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: PushImage
    displayName: 'Push vote image to ACR'
    steps:

    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: login
        containerRegistry: '<your-acr-service-connection>'

    - task: Bash@3
      displayName: 'Tag and push image to ACR'
      inputs:
        targetType: inline
        script: |
          docker tag $(imageRepository):$(tag) $(acrLoginServer)/$(imageRepository):$(tag)
          docker tag $(imageRepository):latest $(acrLoginServer)/$(imageRepository):latest
          docker push $(acrLoginServer)/$(imageRepository):$(tag)
          docker push $(acrLoginServer)/$(imageRepository):latest

# ─────────────────────────────────────────────
# STAGE 3: Update Manifest (CD - GitOps)
# ─────────────────────────────────────────────
- stage: UpdateManifest
  displayName: 'Update k8s Manifest – Trigger ArgoCD'
  dependsOn: Push
  condition: succeeded()
  jobs:
  - job: UpdateTag
    displayName: 'Update image tag in k8s manifest'
    steps:

    - task: Bash@3
      displayName: 'Configure git'
      inputs:
        targetType: inline
        script: |
          git config --global user.email "pipeline@azuredevops.com"
          git config --global user.name "Azure Pipeline"

    - task: Bash@3
      displayName: 'Clone manifests repo'
      inputs:
        targetType: inline
        script: |
          git clone https://$(System.AccessToken)@dev.azure.com/<your-org>/<your-project>/_git/$(manifestRepo) manifests
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    - task: Bash@3
      displayName: 'Update image tag in deployment manifest'
      inputs:
        targetType: inline
        script: |
          cd manifests

          # Replace the image tag with the new build ID
          sed -i "s|$(acrLoginServer)/$(imageRepository):.*|$(acrLoginServer)/$(imageRepository):$(tag)|g" $(manifestFile)

          echo "Updated manifest:"
          cat $(manifestFile)

    - task: Bash@3
      displayName: 'Commit and push updated manifest'
      inputs:
        targetType: inline
        script: |
          cd manifests
          git add $(manifestFile)
          git commit -m "Update vote image tag to $(tag) [skip ci]"
          git push
      # ArgoCD detects this commit and automatically deploys to AKS
      # [skip ci] prevents this commit from triggering another pipeline run
